<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAI Homecoming Face Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="stage-panel" aria-label="얼굴 세그먼트 게임">
        <header class="topbar">
          <div>
            <p>2026 HAI 홈커밍데이</p>
            <h1>다음 HAI 연구원은 누구일까요?</h1>
          </div>
          <div class="scoreboard">
            <span id="roundLabel">Round 1</span>
            <strong id="scoreLabel">0</strong>
          </div>
        </header>

        <div class="stage" id="stage">
          <div class="face-guide" aria-hidden="true"></div>
          <div class="segment" id="segmentBrow"></div>
          <div class="segment reverse" id="segmentEyes"></div>
          <div class="segment" id="segmentNose"></div>
          <div class="segment reverse" id="segmentMouth"></div>
        </div>

        <div class="controls">
          <fieldset class="hint-controls">
            <legend>Hints</legend>
            <label><input type="checkbox" id="hintBrow" checked /> 눈썹</label>
            <label><input type="checkbox" id="hintEyes" /> 눈</label>
            <label><input type="checkbox" id="hintNose" /> 코</label>
            <label><input type="checkbox" id="hintMouth" /> 입</label>
          </fieldset>

          <label class="speed-control">
            <span>속도</span>
            <input id="speedRange" type="range" min="4" max="18" value="9" />
          </label>

          <button id="nextButton" type="button">다음 문제</button>
        </div>
      </section>

      <aside class="answer-panel">
        <div class="answer-header">
          <p>Scoreboard</p>
          <h2>진행 패널</h2>
        </div>
        <div class="judge-panel">
          <label class="winner-field">
            <span>정답자</span>
            <input id="winnerInput" type="text" list="playerNames" placeholder="이름 입력" autocomplete="off" />
            <datalist id="playerNames"></datalist>
          </label>
          <div class="judge-actions">
            <button id="awardButton" type="button">정답자 등록</button>
            <button id="voidButton" type="button">무효</button>
            <button id="endButton" type="button">END</button>
          </div>
        </div>
        <div class="score-chart" id="scoreChart"></div>
        <button class="reveal-button" id="revealButton" type="button">정답 확인</button>
        <div class="result" id="result" hidden>
          <img id="resultImage" alt="" />
          <div>
            <p id="resultState">이번 정답</p>
            <h3 id="resultName"></h3>
            <span id="resultRole"></span>
          </div>
        </div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
